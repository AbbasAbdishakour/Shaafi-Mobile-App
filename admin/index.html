<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shaafi Admin — Login</title>
  <link rel="stylesheet" href="css/admin.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="main-content login-page">
    <div class="login-card">
      <div class="login-logo">🏥</div>
      <h1>Shaafi Admin</h1>
      <p>Sign in to manage the platform</p>

      <div id="alert-container"></div>

      <form id="login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" class="form-input" placeholder="admin@shaafi.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" class="form-input" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; padding:14px; justify-content:center; margin-top:8px;">
          Sign In
        </button>
      </form>
    </div>
  </div>

  <script src="js/admin.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = e.target.querySelector('button');
      
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Signing in...';

      const { error } = await sb.auth.signInWithPassword({ email, password });
      
      if (error) {
        showAlert(error.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      } else {
        window.location.href = 'dashboard.html';
      }
    });

    (async () => {
      const { data: { session } } = await sb.auth.getSession();
      if (session) window.location.href = 'dashboard.html';
    })();
  </script>
</body>
</html>
