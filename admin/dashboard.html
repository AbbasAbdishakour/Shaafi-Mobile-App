<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shaafi Admin — Dashboard</title>
  <link rel="stylesheet" href="css/admin.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="page-header"><h1>Dashboard</h1></div>
    <div class="page-body">
      <div id="alert-container"></div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-icon" style="background:#2F80ED15; color:#2F80ED;">👨‍⚕️</div><div class="stat-info"><div class="stat-value" id="total-doctors">-</div><div class="stat-label">Total Doctors</div></div></div>
        <div class="stat-card"><div class="stat-icon" style="background:#34C75915; color:#34C759;">👥</div><div class="stat-info"><div class="stat-value" id="total-patients">-</div><div class="stat-label">Total Patients</div></div></div>
        <div class="stat-card"><div class="stat-icon" style="background:#FF950015; color:#FF9500;">📅</div><div class="stat-info"><div class="stat-value" id="total-appointments">-</div><div class="stat-label">Appointments</div></div></div>
        <div class="stat-card"><div class="stat-icon" style="background:#FF3B3015; color:#FF3B30;">💰</div><div class="stat-info"><div class="stat-value" id="total-revenue">-</div><div class="stat-label">Total Revenue</div></div></div>
      </div>
      <div class="card">
        <div class="card-header">Recent Appointments</div>
        <table><thead><tr><th>Doctor</th><th>Patient ID</th><th>Date</th><th>Time</th><th>Status</th></tr></thead>
          <tbody id="appointments-body"><tr><td colspan="5" style="text-align:center;padding:32px;color:var(--grey);"><div class="spinner" style="border-color:var(--light-grey);border-top-color:var(--primary);margin:0 auto 12px;"></div>Loading...</td></tr></tbody>
        </table>
      </div>
    </div>
  </main>
  <script src="js/admin.js"></script>
  <script>
    (async () => {
      const user = await checkAuth(); if (!user) return; loadSidebar('Dashboard');
      const [doctorsRes, patientsRes, appointmentsRes, paymentsRes] = await Promise.all([
        sb.from('doctors').select('id', { count: 'exact' }),
        sb.from('patients').select('id', { count: 'exact' }),
        sb.from('appointments').select('*').order('created_at', { ascending: false }),
        sb.from('payments').select('amount')
      ]);
      const appointments = appointmentsRes.data || [];
      const totalRevenue = (paymentsRes.data || []).reduce((sum, p) => sum + (p.amount || 0), 0);
      document.getElementById('total-doctors').textContent = doctorsRes.count || 0;
      document.getElementById('total-patients').textContent = patientsRes.count || 0;
      document.getElementById('total-appointments').textContent = appointments.length;
      document.getElementById('total-revenue').textContent = formatCurrency(totalRevenue);
      const tbody = document.getElementById('appointments-body');
      const recent = appointments.slice(0, 10);
      tbody.innerHTML = recent.length === 0
        ? '<tr><td colspan="5" style="text-align:center;padding:24px;color:var(--grey);">No appointments yet</td></tr>'
        : recent.map(a => `<tr><td><strong>${a.doctor_name || '-'}</strong></td><td>${a.patient_id?.slice(0,10) || a.user_id?.slice(0,10) || '-'}...</td><td>${a.date || '-'}</td><td>${a.time || '-'}</td><td>${statusBadge(a.status)}</td></tr>`).join('');
    })();
  </script>
</body>
</html>
